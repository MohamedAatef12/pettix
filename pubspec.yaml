name: pettix
description: "Pet Care App"

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.1

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.0
  email_auth: ^2.0.0
  mailer: ^6.1.0

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flex_color_scheme: ^8.2.0
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  device_preview: ^1.2.0
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.2.0
  smooth_page_indicator: ^1.2.0
  iconsax: ^0.0.8

  # State Management & Architectures
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0
  intl: 0.20.2

  # Caching & Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Logging & Debugging
  talker: ^4.8.0
  talker_flutter: ^4.8.0
  talker_dio_logger: ^4.8.0
  talker_bloc_logger: ^4.8.0

  # Routing & Navigation
  go_router: ^15.1.2

  # Localization & Translations
  easy_localization: ^3.0.7+1

  # Configuration & Environment
  envied: ^1.1.1

  # Permissions & Connectivity
  permission_handler: ^12.0.0+1
  connectivity_plus: ^6.1.4
  pinput: ^5.0.2
  flutter_localization: ^0.3.3
  flutter_image_compress: ^2.4.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  googleapis_auth: ^2.0.0
  signalr_netcore: ^1.3.6


dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  envied_generator: ^1.1.1
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.3
  flutter_flavorizr: ^2.4.1



flavorizr:
  ide: "vscode"
  app:
    android:
      flavorDimensions: "app"
  flavors:
    development:
      app:
        name: "Pettix Dev"
      android:
        applicationId: "com.pettix.up"
        icon: "assets/images/logo.png"
        firebase:
          config: "config/development/android/google-services.json"
      ios:
        bundleId: "com.pettix.up"
        icon: "assets/images/logo.png"
        # firebase:
        #   config: "config/development/ios/GoogleService-Info.plist"
    production:
      app:
        name: "Pettix"
      android:
        applicationId: "com.pettix.up"
        icon: "assets/images/logo.png"
        firebase:
          config: "config/production/android/google-services.json"
      ios:
        bundleId: "com.pettix.up"
        icon: "assets/images/logo.png"
        # firebase:
        #   config: "config/production/ios/GoogleService-Info.plist"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/translations/
    - assets/notification_key/
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
